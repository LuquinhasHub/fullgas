<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullgas Dealer Shop</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ====== cabeçalho vermelho ====== -->
  <header class="shop-head">
    <div>
      <div class="sh-title">FULLGAS Dealer Shop</div>
      <div class="sh-user" id="sh-user"></div>
    </div>

    <button class="menu-btn" id="menu-btn" type="button"><span id="menu-x">☰</span> MENU</button>
    <nav class="shop-mega" id="shop-mega"></nav>

    <a class="pf-link" href="finder.html" style="color:#fff;font-size:11px;font-weight:700;line-height:1.2;">
      🔍 SPARE<br>PARTS<br>FINDER
    </a>

    <form class="sh-search" id="sh-search">
      <input id="sh-q" type="text" placeholder="Buscar artigos...">
      <button type="submit" aria-label="Buscar">🔍</button>
    </form>

    <div class="sh-icons">
      <a href="#/carrinho" title="Carrinho">🛒<span class="cart-n" id="cart-n">0</span></a>
      <a href="#/quick-order" title="Quick Order">⚡</a>
      <a href="#/pedidos" title="Histórico de pedidos">🧾</a>
      <a href="portal.html" title="Voltar ao portal">↩</a>
      <span class="brand white" style="font-size:15px;"><span class="g-badge" style="width:22px;height:22px;font-size:13px;border-width:2px;">F</span> FULLGAS</span>
    </div>
  </header>

  <!-- ====== faixa de página ====== -->
  <div class="page-band">
    <div class="bc" id="page-bc"><a href="#/">LOJA</a></div>
    <div class="title" id="page-title">CATEGORIAS</div>
  </div>

  <main class="shop" id="view"></main>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/api-adapter.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
