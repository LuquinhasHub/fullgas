<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullgas SpareParts Finder</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="finder-top">
    <div>
      <h1>SparePartsFinder</h1>
      <div class="who" id="fd-who"></div>
    </div>
    <span class="brand"><span class="g-badge">F</span> FULLGAS</span>
  </div>

  <button class="btn usage-btn" id="btn-usage" type="button">Usage list</button>

  <main class="finder">

    <!-- ====== painel de busca ====== -->
    <div class="search-panel" id="search-panel">
      <button class="sp-title" id="sp-toggle" type="button">▾ Search</button>
      <a href="#" class="reset" id="sp-reset">[Reset]</a>

      <div id="sp-body">
        <div class="sp-grid">
          <div>
            <label for="sp-vin">Search by VIN</label>
            <input id="sp-vin" type="text" placeholder="">

            <label for="sp-eng" style="margin-top:12px;">Engine Number</label>
            <input id="sp-eng" type="text" placeholder="">

            <label style="margin-top:12px;">Category</label>
            <div class="radio-line">
              <label><input type="radio" name="sp-cat" value="engine"> Engine</label>
              <label><input type="radio" name="sp-cat" value="chassi" checked> Frame</label>
            </div>

            <button class="btn" id="sp-search" type="button">Search</button>
          </div>

          <div>
            <label>Select Model</label>
            <div class="model-select">
              <div class="ms-box">
                <input id="ms-input" type="text" readonly placeholder="① FG 125 2025" value="">
                <button id="ms-open" type="button" aria-label="Abrir árvore de modelos">▾</button>
              </div>
              <div class="model-tree" id="model-tree"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="fd-view"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/api-adapter.js"></script>
  <script src="js/finder.js"></script>
</body>
</html>
